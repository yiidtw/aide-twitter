[agent]
name = "twitter"
version = "0.1.0"
description = "Twitter/X agent — post, draft, engage via debug Chrome"
author = "ydwu"

[persona]
file = "persona.md"

[skills.tweet]
script = "skills/tweet.ts"
description = "Post a tweet via debug Chrome"
usage = "tweet <text>"

[skills.check]
script = "skills/check.ts"
description = "Read latest tweets from timeline"
usage = "check [count]"

[skills.engage]
script = "skills/engage.ts"
description = "Check notifications and recent mentions"
usage = "engage"

[skills.delete]
script = "skills/delete.ts"
description = "Delete latest N tweets from own profile"
usage = "delete [count]"

[skills.abort]
script = "skills/abort.ts"
description = "Dismiss compose drafts and close compose tabs"
usage = "abort"

[skills.draft]
script = "skills/draft.sh"
description = "Save a draft tweet for later"
usage = "draft <text>"

[skills.drafts]
script = "skills/drafts.sh"
description = "List saved drafts"
usage = "drafts"

[skills.e2e]
script = "skills/e2e.ts"
description = "End-to-end test: tweet, check, delete, verify no draft"
usage = "e2e"

[knowledge]
dir = "knowledge/"

[expose.github]
repo = "yiidtw/aide-twitter"

[env]
required = []
optional = []

[limits]
max_timeout = 60
max_tokens = 4096
max_retry = 1
